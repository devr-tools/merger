service:
  ingest_address: ":8080"
  controlplane_address: ":8081"
  controlplane_grpc_address: ":9091"

logging:
  level: info

github:
  enabled: false
  webhook_secret: "replace-me"
  app_id: "replace-me"
  installation_id: 0
  private_key_path: "./secrets/github-app.pem"
  api_base_url: "https://api.github.com"
  timeout: "10s"

events:
  backend: nats
  subject_prefix: merger
  nats_url: "nats://127.0.0.1:4222"
  stream_name: "MERGER_EVENTS"
  durable_prefix: "merger"

persistence:
  backend: postgres
  database_url: "postgres://merger:merger@127.0.0.1:5432/merger?sslmode=disable"
  auto_migrate: true

policy:
  path: config/policies/default.yaml

lanes:
  green_max: 20
  yellow_max: 55
  red_max: 85

telemetry:
  service_name: merger
  environment: dev

runtime_graph:
  enable_codeowners: true
