syntax = "proto3";

package merger.v1;

option go_package = "github.com/devr-tools/merger/proto/merger/v1;mergerv1";

message ChangePacketRef {
  string id = 1;
}

message EvidenceExecution {
  string change_packet_id = 1;
  string name = 2;
  string type = 3;
  string status = 4;
  bool required = 5;
  string summary = 6;
  string details_url = 7;
  string updated_by = 8;
  string updated_at = 9;
}

message GetChangePacketRequest {
  ChangePacketRef ref = 1;
}

message GetChangePacketResponse {
  string id = 1;
  string merge_lane = 2;
  int32 risk_score = 3;
  repeated EvidenceExecution evidence = 4;
}

message ListChangePacketsRequest {
  int32 limit = 1;
}

message ChangePacketSummary {
  string id = 1;
  string repo = 2;
  int32 pr_number = 3;
  string merge_lane = 4;
  int32 risk_score = 5;
}

message ListChangePacketsResponse {
  repeated ChangePacketSummary items = 1;
}

message UpdateEvidenceExecutionRequest {
  string change_packet_id = 1;
  string name = 2;
  string type = 3;
  string status = 4;
  bool required = 5;
  string summary = 6;
  string details_url = 7;
  string updated_by = 8;
}

message UpdateEvidenceExecutionResponse {
  EvidenceExecution evidence = 1;
}

message EvidenceAuditEntry {
  string id = 1;
  string change_packet_id = 2;
  string evidence_name = 3;
  string from_status = 4;
  string to_status = 5;
  string actor = 6;
  string summary = 7;
  string details_url = 8;
  map<string, string> metadata = 9;
  string occurred_at = 10;
}

message ListEvidenceAuditEntriesRequest {
  string change_packet_id = 1;
  int32 limit = 2;
}

message ListEvidenceAuditEntriesResponse {
  repeated EvidenceAuditEntry items = 1;
}

service ChangeControlService {
  rpc GetChangePacket(GetChangePacketRequest) returns (GetChangePacketResponse);
  rpc ListChangePackets(ListChangePacketsRequest) returns (ListChangePacketsResponse);
  rpc UpdateEvidenceExecution(UpdateEvidenceExecutionRequest) returns (UpdateEvidenceExecutionResponse);
  rpc ListEvidenceAuditEntries(ListEvidenceAuditEntriesRequest) returns (ListEvidenceAuditEntriesResponse);
}
